<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="55%" stop-color="#1b263b"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="equity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="280" fill="url(#bg)" rx="14"/>

  <!-- faint grid -->
  <g stroke="#274060" stroke-width="0.5" opacity="0.35">
    <line x1="0" y1="70" x2="1000" y2="70"/>
    <line x1="0" y1="140" x2="1000" y2="140"/>
    <line x1="0" y1="210" x2="1000" y2="210"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
  </g>

  <!-- ====================== LEFT: 6G / SAGIN ====================== -->
  <!-- LEO satellite orbiting -->
  <g>
    <ellipse cx="160" cy="95" rx="120" ry="40" fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.5"/>
    <g>
      <animateMotion dur="9s" repeatCount="indefinite"
        path="M 280,95 A 120,40 0 1,1 40,95 A 120,40 0 1,1 280,95"/>
      <rect x="-9" y="-5" width="18" height="10" rx="2" fill="#93c5fd"/>
      <rect x="-21" y="-3" width="10" height="6" fill="#3b82f6"/>
      <rect x="11" y="-3" width="10" height="6" fill="#3b82f6"/>
    </g>
  </g>

  <!-- UAV hovering -->
  <g transform="translate(95,165)">
    <animateTransform attributeName="transform" type="translate"
      values="95,165; 95,157; 95,165" dur="3.2s" repeatCount="indefinite"/>
    <line x1="-14" y1="-6" x2="14" y2="-6" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="-14" cy="-6" r="5" fill="none" stroke="#93c5fd" stroke-width="1.4">
      <animate attributeName="r" values="5;6.5;5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="-6" r="5" fill="none" stroke="#93c5fd" stroke-width="1.4">
      <animate attributeName="r" values="6.5;5;6.5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-7" y="-4" width="14" height="9" rx="3" fill="#60a5fa"/>
  </g>

  <!-- ground base station -->
  <g transform="translate(215,235)">
    <polygon points="-10,0 10,0 4,-42 -4,-42" fill="#475569"/>
    <line x1="-12" y1="-42" x2="12" y2="-42" stroke="#94a3b8" stroke-width="2.5"/>
    <circle cx="0" cy="-46" r="3" fill="#f87171">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- expanding signal waves from base station -->
  <g fill="none" stroke="#38bdf8" stroke-width="1.4">
    <circle cx="215" cy="190" r="8" opacity="0">
      <animate attributeName="r" values="8;48" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="215" cy="190" r="8" opacity="0">
      <animate attributeName="r" values="8;48" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="215" cy="190" r="8" opacity="0">
      <animate attributeName="r" values="8;48" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- moving data packets: links between nodes -->
  <g>
    <line x1="215" y1="190" x2="160" y2="100" stroke="#1d4ed8" stroke-width="0.8" opacity="0.45"/>
    <line x1="215" y1="190" x2="95" y2="160" stroke="#1d4ed8" stroke-width="0.8" opacity="0.45"/>
    <circle r="3" fill="#fbbf24">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M 215,190 L 160,100"/>
      <animate attributeName="opacity" values="1;0.2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#fbbf24">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M 95,160 L 215,190"/>
    </circle>
  </g>

  <text x="160" y="262" fill="#7dd3fc" font-size="13" text-anchor="middle" letter-spacing="2">AI-NATIVE 6G · SAGIN · DRL</text>

  <!-- ====================== RIGHT: QUANT TRADING ====================== -->
  <!-- candlesticks -->
  <g transform="translate(700,0)">
    <g stroke-width="1.2">
      <g stroke="#4ade80"><line x1="20" y1="150" x2="20" y2="205"/><rect x="15" y="160" width="10" height="32" fill="#4ade80"/></g>
      <g stroke="#f87171"><line x1="45" y1="145" x2="45" y2="200"/><rect x="40" y="152" width="10" height="30" fill="#f87171"/></g>
      <g stroke="#4ade80"><line x1="70" y1="120" x2="70" y2="185"/><rect x="65" y="130" width="10" height="40" fill="#4ade80"/></g>
      <g stroke="#4ade80"><line x1="95" y1="100" x2="95" y2="160"/><rect x="90" y="110" width="10" height="36" fill="#4ade80"/></g>
      <g stroke="#f87171"><line x1="120" y1="105" x2="120" y2="165"/><rect x="115" y="112" width="10" height="34" fill="#f87171"/></g>
      <g stroke="#4ade80"><line x1="145" y1="80" x2="145" y2="140"/><rect x="140" y="90" width="10" height="38" fill="#4ade80"/></g>
      <g stroke="#4ade80"><line x1="170" y1="60" x2="170" y2="118"/><rect x="165" y="70" width="10" height="34" fill="#4ade80"/></g>
    </g>

    <!-- equity curve drawing itself, looping -->
    <path d="M 10,210 C 40,200 55,185 75,170 S 110,150 130,125 S 160,95 185,75 S 205,62 215,55"
          fill="none" stroke="url(#equity)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="340" stroke-dashoffset="340">
      <animate attributeName="stroke-dashoffset" values="340;0;0" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- tracking dot on the curve -->
    <circle r="5" fill="#4ade80">
      <animateMotion dur="6s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.7;1"
        path="M 10,210 C 40,200 55,185 75,170 S 110,150 130,125 S 160,95 185,75 S 205,62 215,55"/>
    </circle>
    <circle r="11" fill="url(#glow)">
      <animateMotion dur="6s" repeatCount="indefinite" keyPoints="0;1;1" keyTimes="0;0.7;1"
        path="M 10,210 C 40,200 55,185 75,170 S 110,150 130,125 S 160,95 185,75 S 205,62 215,55"/>
    </circle>

    <!-- regime chips blinking -->
    <g font-size="10" font-weight="bold">
      <rect x="160" y="20" width="44" height="16" rx="8" fill="#064e3b"/>
      <text x="182" y="31.5" fill="#4ade80" text-anchor="middle">BULL
        <animate attributeName="opacity" values="1;0.35;1" dur="3s" repeatCount="indefinite"/>
      </text>
      <rect x="108" y="20" width="48" height="16" rx="8" fill="#3f1d2b"/>
      <text x="132" y="31.5" fill="#fb7185" text-anchor="middle">CRISIS
        <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <text x="815" y="262" fill="#86efac" font-size="13" text-anchor="middle" letter-spacing="2">SYSTEMATIC TRADING · REGIME AI</text>

  <!-- ====================== CENTER: bridge + name ====================== -->
  <!-- pulses flowing between the two worlds -->
  <g>
    <line x1="330" y1="140" x2="670" y2="140" stroke="#334155" stroke-width="1" stroke-dasharray="4 6" opacity="0.7"/>
    <circle r="3.5" fill="#60a5fa">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M 330,140 L 670,140"/>
    </circle>
    <circle r="3.5" fill="#4ade80">
      <animateMotion dur="3.5s" begin="1.7s" repeatCount="indefinite" path="M 670,140 L 330,140"/>
    </circle>
  </g>

  <text x="500" y="108" fill="#f1f5f9" font-size="30" font-weight="bold" text-anchor="middle">Wendenda Nathanael Kaboré</text>
  <text x="500" y="135" fill="#94a3b8" font-size="15" text-anchor="middle">PhD · Deep Reinforcement Learning</text>
  <text x="500" y="172" fill="#cbd5e1" font-size="14" text-anchor="middle" font-style="italic">One toolkit, two frontiers — multi-agent AI for</text>
  <text x="500" y="192" fill="#cbd5e1" font-size="14" text-anchor="middle" font-style="italic">6G networks &amp; financial markets</text>
</svg>
